name: PreflightOps

# Pull-request risk gate.
#
# PreflightOps reads your change inputs, scores the deployment risk, writes a
# Markdown report, uploads it as a build artifact, posts it as a PR comment, and
# fails the build when the assessed risk level is CRITICAL.
#
# Edit the file paths in `env` below to point at the inputs in your repository.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  risk-review:
    name: Risk review
    runs-on: ubuntu-latest

    env:
      # --- Edit these to match your repository ---
      # How PreflightOps is installed. Point this at wherever the PreflightOps
      # source lives. By default it installs straight from the PreflightOps repo.
      # If PreflightOps ever ships to PyPI you can simply use: preflightops
      PREFLIGHTOPS_INSTALL: "git+https://github.com/pedroluna-gh/preflightops.git@main"
      # Required inputs.
      PREFLIGHTOPS_SERVICES: services.yaml
      PREFLIGHTOPS_CHANGE: change.yaml
      # Optional inputs. Leave blank or delete the file to skip them.
      PREFLIGHTOPS_TERRAFORM: tfplan.txt
      PREFLIGHTOPS_K8S: k8s.yaml
      # Where the Markdown report is written.
      PREFLIGHTOPS_REPORT: preflightops-report.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PreflightOps
        run: pip install "$PREFLIGHTOPS_INSTALL"

      - name: Run PreflightOps risk assessment
        id: preflightops
        run: |
          set -uo pipefail

          args=(--services "$PREFLIGHTOPS_SERVICES" --change "$PREFLIGHTOPS_CHANGE")

          if [ -n "${PREFLIGHTOPS_TERRAFORM:-}" ] && [ -f "$PREFLIGHTOPS_TERRAFORM" ]; then
            args+=(--terraform "$PREFLIGHTOPS_TERRAFORM")
          fi
          if [ -n "${PREFLIGHTOPS_K8S:-}" ] && [ -f "$PREFLIGHTOPS_K8S" ]; then
            args+=(--k8s "$PREFLIGHTOPS_K8S")
          fi

          args+=(--output "$PREFLIGHTOPS_REPORT")

          # Capture the exit code so we can still upload the report and comment
          # on the PR before failing the build on CRITICAL risk.
          set +e
          python -m preflightops.cli "${args[@]}"
          exit_code=$?
          set -e

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Upload risk report
        if: always() && hashFiles(env.PREFLIGHTOPS_REPORT) != ''
        uses: actions/upload-artifact@v4
        with:
          name: preflightops-report
          path: ${{ env.PREFLIGHTOPS_REPORT }}

      - name: Comment risk report on pull request
        if: always() && github.event_name == 'pull_request' && hashFiles(env.PREFLIGHTOPS_REPORT) != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- preflightops-report -->';
            const body = `${marker}\n` + fs.readFileSync(process.env.PREFLIGHTOPS_REPORT, 'utf8');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number },
            );
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on CRITICAL risk
        if: always()
        run: |
          if [ "${{ steps.preflightops.outputs.exit_code }}" != "0" ]; then
            echo "PreflightOps reported CRITICAL risk (exit code ${{ steps.preflightops.outputs.exit_code }})."
            exit 1
          fi
          echo "PreflightOps risk check passed."
