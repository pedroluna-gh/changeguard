name: "PreflightOps"
description: "Pre-deployment risk assessment that scores production change risk and can fail the build on critical risk."
author: "Pedro Jose Luna Salmon"
branding:
  icon: "shield"
  color: "red"

inputs:
  services:
    description: "Path to the service catalog YAML file."
    required: true
  change:
    description: "Path to the change request YAML file."
    required: true
  terraform:
    description: "Optional path to a Terraform plan/diff text file."
    required: false
    default: ""
  k8s:
    description: "Optional path to a Kubernetes manifest YAML file."
    required: false
    default: ""
  output:
    description: "Path to write the Markdown report."
    required: false
    default: "preflightops-report.md"
  json-output:
    description: "Path to write the JSON report."
    required: false
    default: "preflightops-report.json"
  ticket-output:
    description: "Optional path to write a ServiceNow/Jira-ready change ticket summary."
    required: false
    default: ""
  ticket-template:
    description: "Optional path to a YAML or JSON ticket template."
    required: false
    default: ""
  servicenow:
    description: "Optional ServiceNow instance URL for opt-in live ticket push. Credentials come from the SERVICENOW_USER / SERVICENOW_PASSWORD environment variables (set them from GitHub Actions secrets)."
    required: false
    default: ""
  jira:
    description: "Optional Jira base URL for opt-in live ticket push. Credentials come from the JIRA_EMAIL / JIRA_API_TOKEN / JIRA_PROJECT_KEY environment variables (set them from GitHub Actions secrets)."
    required: false
    default: ""
  assume-yes:
    description: "Skip confirmation prompts for explicitly requested live ServiceNow/Jira push."
    required: false
    default: "false"
  fail-on:
    description: "Minimum risk level that fails the action: none, low, medium, high, or critical."
    required: false
    default: "critical"
  python-version:
    description: "Python version to set up."
    required: false
    default: "3.11"

outputs:
  risk-level:
    description: "Assessed risk level (LOW, MEDIUM, HIGH, CRITICAL)."
    value: ${{ steps.assess.outputs.risk-level }}
  risk-score:
    description: "Assessed risk score (0-100)."
    value: ${{ steps.assess.outputs.risk-score }}
  report-path:
    description: "Path to the generated Markdown report."
    value: ${{ steps.assess.outputs.report-path }}
  json-report-path:
    description: "Path to the generated JSON report."
    value: ${{ steps.assess.outputs.json-report-path }}
  ticket-path:
    description: "Path to the generated change ticket summary (empty when ticket-output was not set)."
    value: ${{ steps.assess.outputs.ticket-path }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install PreflightOps
      shell: bash
      run: pip install "${{ github.action_path }}"

    - name: Run PreflightOps risk assessment
      id: assess
      shell: bash
      env:
        PFO_SERVICES: ${{ inputs.services }}
        PFO_CHANGE: ${{ inputs.change }}
        PFO_TERRAFORM: ${{ inputs.terraform }}
        PFO_K8S: ${{ inputs.k8s }}
        PFO_OUTPUT: ${{ inputs.output }}
        PFO_JSON: ${{ inputs.json-output }}
        PFO_TICKET: ${{ inputs.ticket-output }}
        PFO_TICKET_TEMPLATE: ${{ inputs.ticket-template }}
        PFO_SERVICENOW: ${{ inputs.servicenow }}
        PFO_JIRA: ${{ inputs.jira }}
        PFO_ASSUME_YES: ${{ inputs.assume-yes }}
        PFO_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -uo pipefail

        args=(--services "$PFO_SERVICES" --change "$PFO_CHANGE")
        if [ -n "$PFO_TERRAFORM" ] && [ -f "$PFO_TERRAFORM" ]; then
          args+=(--terraform "$PFO_TERRAFORM")
        fi
        if [ -n "$PFO_K8S" ] && [ -f "$PFO_K8S" ]; then
          args+=(--k8s "$PFO_K8S")
        fi
        args+=(--output "$PFO_OUTPUT" --json-output "$PFO_JSON")

        # Optional, copy/paste-ready change ticket summary (offline; no network).
        if [ -n "$PFO_TICKET" ]; then
          args+=(--ticket-output "$PFO_TICKET")
        fi
        if [ -n "$PFO_TICKET_TEMPLATE" ]; then
          args+=(--ticket-template "$PFO_TICKET_TEMPLATE")
        fi

        # Opt-in live push. Only added when a non-empty instance/base URL is
        # given; credentials are read from the environment (SERVICENOW_USER /
        # SERVICENOW_PASSWORD, JIRA_EMAIL / JIRA_API_TOKEN / JIRA_PROJECT_KEY)
        # and are never passed on the command line.
        if [ -n "$PFO_SERVICENOW" ]; then
          args+=(--servicenow "$PFO_SERVICENOW")
        fi
        if [ -n "$PFO_JIRA" ]; then
          args+=(--jira "$PFO_JIRA")
        fi

        # A live push has no interactive terminal in CI, so it is skipped unless
        # confirmation is waived. Map the action's assume-yes input to --yes.
        assume_yes=$(echo "$PFO_ASSUME_YES" | tr '[:upper:]' '[:lower:]')
        if [ "$assume_yes" = "true" ]; then
          args+=(--yes)
        fi

        cli_exit=0
        preflightops "${args[@]}" || cli_exit=$?

        # Exit code 2 means an input/parse/runtime error: fail hard.
        if [ "$cli_exit" -eq 2 ]; then
          echo "::error::PreflightOps failed to run (exit code 2)."
          exit 2
        fi

        level=$(python -c "import json; print(json.load(open('$PFO_JSON'))['risk_level'])")
        score=$(python -c "import json; print(json.load(open('$PFO_JSON'))['risk_score'])")

        {
          echo "risk-level=$level"
          echo "risk-score=$score"
          echo "report-path=$PFO_OUTPUT"
          echo "json-report-path=$PFO_JSON"
          echo "ticket-path=$PFO_TICKET"
        } >> "$GITHUB_OUTPUT"

        echo "PreflightOps risk: $level ($score/100)"

        # Gate the job based on fail-on.
        # Use a case statement (not associative arrays) so this works on
        # macOS runners, which ship Bash 3.2 and lack "declare -A".
        case "$level" in
          LOW) lv=0 ;;
          MEDIUM) lv=1 ;;
          HIGH) lv=2 ;;
          CRITICAL) lv=3 ;;
          *) lv=0 ;;
        esac

        fail_on=$(echo "$PFO_FAIL_ON" | tr '[:upper:]' '[:lower:]')
        case "$fail_on" in
          none) th=99 ;;
          low) th=0 ;;
          medium) th=1 ;;
          high) th=2 ;;
          critical) th=3 ;;
          *)
            echo "::warning::Unknown fail-on value '$PFO_FAIL_ON'; defaulting to 'critical'."
            th=3
            ;;
        esac

        if [ "$lv" -ge "$th" ]; then
          echo "::error::PreflightOps risk level $level meets or exceeds fail-on threshold ($PFO_FAIL_ON)."
          exit 1
        fi
